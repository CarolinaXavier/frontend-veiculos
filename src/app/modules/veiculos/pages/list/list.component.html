<div class="header">
  <h2>Veículos</h2>

  <button mat-raised-button color="primary" routerLink="/veiculos/novo">
    + Novo Veículo
  </button>
</div>
<table mat-table [dataSource]="veiculos">

  <!-- PLACA -->
  <ng-container matColumnDef="placa">
    <th mat-header-cell *matHeaderCellDef> Placa </th>
    <td mat-cell *matCellDef="let v"> {{ v.placa }} </td>
  </ng-container>

  <!-- MODELO -->
  <ng-container matColumnDef="modelo">
    <th mat-header-cell *matHeaderCellDef> Modelo </th>
    <td mat-cell *matCellDef="let v"> {{ v.modelo }} </td>
  </ng-container>

  <!-- AÇÕES -->
  <ng-container matColumnDef="acoes">
    <th mat-header-cell *matHeaderCellDef> Ações </th>
    <td mat-cell *matCellDef="let v">
      <button mat-icon-button color="primary" [routerLink]="['/veiculos/editar', v._id]" matTooltip="Editar">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="excluir(v._id)" matTooltip="Excluir">
        <mat-icon>delete</mat-icon>
      </button>

    </td>
  </ng-container>

  <!-- HEADER -->
  <tr mat-header-row *matHeaderRowDef="['placa','modelo','acoes']"></tr>

  <!-- LINHAS -->
  <tr mat-row *matRowDef="let row; columns: ['placa','modelo','acoes'];"></tr>

</table>
