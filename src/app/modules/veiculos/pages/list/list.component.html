<table mat-table [dataSource]="veiculos$ | async">

  <ng-container matColumnDef="placa">
    <th mat-header-cell *matHeaderCellDef> Placa </th>
    <td mat-cell *matCellDef="let v">{{ v.placa }}</td>
  </ng-container>

  <ng-container matColumnDef="modelo">
    <td mat-cell *matCellDef="let v">{{ v.modelo }}</td>
  </ng-container>

  <ng-container matColumnDef="acoes">
    <td mat-cell *matCellDef="let v">
      <button mat-button [routerLink]="['/veiculos/editar', v._id]">Editar</button>
      <button mat-button color="warn" (click)="excluir(v._id)">Excluir</button>
    </td>
  </ng-container>

</table>

<button mat-fab color="primary" routerLink="/veiculos/novo">+</button>
